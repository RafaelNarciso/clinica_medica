spring.datasource.url=jdbc:mysql://localhost:3306/medicina_api
spring.datasource.username=${DB_USER_MY_SQL}
spring.datasource.password=${DB_PASSWORD_MY_SQL}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

server.error.include-stacktrace=never

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=VARCHAR
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.data.web.pageable.serialization-mode=via-dto
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false